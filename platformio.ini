; PlatformIO project configuration — M5Stack AtomS3 pressure sensor
[env:m5stack-atoms3]
platform     = espressif32
board        = m5stack-atoms3
framework    = arduino

monitor_speed = 115200

lib_deps =
    m5stack/M5Unified @ ^0.2.0
    h2zero/NimBLE-Arduino @ ^1.4.2

build_flags =
    ; Enable USB CDC on boot so Serial maps to the native USB port
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
